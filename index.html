<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combat Arena</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="arena">
    <div class="header">
      <h1>Combat Arena</h1>
      <div class="round-display" id="round-display">Round 1</div>
    </div>

    <div class="turn-order-section">
      <div class="turn-order-title">Turn Order</div>
      <div class="turn-order-display" id="turn-order"></div>
    </div>

    <div class="teams-container">
      <div class="team">
        <div class="team-title">Player Team</div>
        <div class="players" id="player-team"></div>
      </div>
      <div class="team">
        <div class="team-title">Enemy Team</div>
        <div class="players" id="enemy-team"></div>
      </div>
    </div>

    <div class="current-turn-info" id="current-turn-info"></div>
    <div class="combat-log" id="combat-log"></div>
    <div id="game-over-screen"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
